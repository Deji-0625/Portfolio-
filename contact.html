<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Deji The Cre8or</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body class="inner-page">

    <div class="bg-streaks"></div>
    <img src="8.png" alt="" id="glass-8">
    <div id="nav-backdrop"></div>

    <div id="dynamic-logo">
        <span class="type-text">DEJI THE CRE</span>
        <img src="8.png" alt="8" class="crystal-8">
        <span class="type-text-end">OR</span>
    </div>

    <a href="index.html" id="desktop-header-logo">
        DEJI THE CRE<img src="8.png" alt="8" class="header-8">OR
    </a>

    <div id="mobile-stacked-logo">
        <div class="stack-top">DEJI THE</div>
        <div class="stack-bottom">CRE<img src="8.png" alt="8" class="stack-8">OR</div>
    </div>

    <nav id="nav-menu">
        <button class="hamburger" aria-label="Toggle menu">
            <span class="line"></span>
            <span class="line"></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            
            <li class="nav-dropdown">
                <a href="#" class="dropdown-toggle">Work <span class="arrow">▼</span></a>
                <ul class="dropdown-menu">
                    <li><a href="designs.html">Designs</a></li>
                    <li><a href="visuals.html">Visuals</a></li>
                </ul>
            </li>
            
            <li><a href="about.html">About</a></li> 
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main id="main-content">
        <header class="hero" style="margin-bottom: 40px;">
            <div class="hero-intro-group reveal">
                <h1 class="main-title">
                    <span class="name-part">LET'S</span>
                    <span class="name-part name-italic gradient-text">TALK</span>
                </h1>
                <p class="bio-text">Have a vision? Let's bring it to life.</p>
            </div>
        </header>

        <div class="contact-grid reveal">
            <div class="contact-form-container">
                <form class="custom-form">
                    <div class="input-group">
                        <input type="text" id="name" required placeholder=" ">
                        <label for="name">Your Name</label>
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" required placeholder=" ">
                        <label for="email">Email Address</label>
                    </div>
                    <div class="input-group">
                        <select id="project-type" required>
                            <option value="" disabled selected>Select Project Type</option>
                            <option value="graphic-design">Graphic / Brand Design</option>
                            <option value="video-editing">Video Editing / Videography</option>
                            <option value="other">Other Inquiry</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <textarea id="message" rows="4" required placeholder=" "></textarea>
                        <label for="message">Tell me about your project...</label>
                    </div>
                    <button type="submit" class="btn primary-btn" style="width: 100%;">Send Message</button>
                </form>
            </div>

            <div class="contact-info">
                <div class="info-block">
                    <h3 class="sub-heading">DIRECT INQUIRIES</h3>
                    <a href="mailto:your.email@example.com" class="contact-link">your.email@example.com</a>
                </div>
                
                <div class="info-block" style="margin-top: 40px;">
                    <h3 class="sub-heading">SOCIALS</h3>
                    <div class="social-links" style="margin-top: 15px;">
                        <a href="#">Instagram</a>
                        <a href="#">Twitter/X</a>
                        <a href="#">Behance</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="JS/script.js"></script>
</body>
</html>
