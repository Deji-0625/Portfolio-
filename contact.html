<main id="main-content">
        <header class="hero" style="margin-bottom: 40px;">
            <div class="hero-intro-group reveal">
                <h1 class="main-title">
                    <span class="name-part">LET'S</span>
                    <span class="name-part name-italic gradient-text">TALK</span>
                </h1>
                <p class="bio-text">Have a vision? Let's bring it to life.</p>
            </div>
        </header>

        <div class="contact-grid reveal">
            <div class="contact-form-container">
                <form class="custom-form">
                    <div class="input-group">
                        <input type="text" id="name" required placeholder=" ">
                        <label for="name">Your Name</label>
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" required placeholder=" ">
                        <label for="email">Email Address</label>
                    </div>
                    <div class="input-group">
                        <select id="project-type" required>
                            <option value="" disabled selected>Select Project Type</option>
                            <option value="graphic-design">Graphic / Brand Design</option>
                            <option value="video-editing">Video Editing / Videography</option>
                            <option value="other">Other Inquiry</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <textarea id="message" rows="4" required placeholder=" "></textarea>
                        <label for="message">Tell me about your project...</label>
                    </div>
                    <button type="submit" class="btn primary-btn" style="width: 100%;">Send Message</button>
                </form>
            </div>

            <div class="contact-info">
                <div class="info-block">
                    <h3 class="sub-heading">DIRECT INQUIRIES</h3>
                    <a href="mailto:your.email@example.com" class="contact-link">your.email@example.com</a>
                </div>
                
                <div class="info-block" style="margin-top: 40px;">
                    <h3 class="sub-heading">SOCIALS</h3>
                    <div class="social-links" style="margin-top: 15px;">
                        <a href="#">Instagram</a>
                        <a href="#">Twitter/X</a>
                        <a href="#">Behance</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
